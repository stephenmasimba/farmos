# FarmOS Apache VirtualHost Configuration
# Port 8081 Configuration for FarmOS
# Add this file to: C:/wamp64/bin/apache/apache2.4.46/conf/extra/farmos.conf

Listen 8081

<VirtualHost *:8081>
    ServerName localhost
    ServerAdmin admin@farmos.local
    
    # Document Root
    DocumentRoot "c:/wamp64/www/farmos"
    
    # Directory Configuration
    <Directory "c:/wamp64/www/farmos">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        
        # Enable PHP
        AddType application/x-httpd-php .php
        AddHandler application/x-httpd-php .php
        
        # Directory Index
        DirectoryIndex index.php index.html
        
        # Security Headers
        Header always set X-Content-Type-Options nosniff
        Header always set X-Frame-Options DENY
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: http://127.0.0.1:8000;"
    </Directory>
    
    # Specific PHP Configuration
    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
        php_flag display_errors On
        php_value error_reporting E_ALL
        php_value memory_limit 256M
        php_value max_execution_time 300
        php_value upload_max_filesize 50M
        php_value post_max_size 50M
    </FilesMatch>
    
    # CORS Configuration for API
    <Location "/api/">
        Header set Access-Control-Allow-Origin "*"
        Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        Header set Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Tenant-ID, Accept"
        Header set Access-Control-Allow-Credentials true
        Header set Access-Control-Max-Age 3600
    </Location>
    
    # WebSocket Proxy Configuration
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Proxy WebSocket connections
    ProxyPass "/ws/" "ws://127.0.0.1:8001/"
    ProxyPassReverse "/ws/" "ws://127.0.0.1:8001/"
    
    # Proxy API calls to backend
    ProxyPass "/api/" "http://127.0.0.1:8000/api/"
    ProxyPassReverse "/api/" "http://127.0.0.1:8000/api/"
    
    # URL Rewriting for Clean URLs
    RewriteEngine On
    RewriteBase /farmos/
    
    # Handle frontend routing
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^begin_pyphp/frontend/public/(.*)$ /begin_pyphp/frontend/public/index.php [L,QSA]
    
    # Security Rules
    RewriteCond %{REQUEST_METHOD} ^(TRACE|TRACK|DEBUG)
    RewriteRule .* - [F,L]
    
    # Block common exploit attempts
    RewriteCond %{QUERY_STRING} (<|%3C).*script.*(%3E|>) [NC,OR]
    RewriteCond %{QUERY_STRING} GLOBALS(=|\[|\%[0-9A-Z]{0,2}) [OR]
    RewriteCond %{QUERY_STRING} _REQUEST(=|\[|\%[0-9A-Z]{0,2})
    RewriteRule .* - [F,L]
    
    # Logging
    ErrorLog "C:/wamp64/logs/farmos_error.log"
    CustomLog "C:/wamp64/logs/farmos_access.log" combined
    
    # Performance
    EnableSendfile On
    EnableMMAP On
    
    # Compression
    LoadModule deflate_module modules/mod_deflate.so
    <Location />
        SetOutputFilter DEFLATE
        SetEnvIfNoCase Request_URI \
            \.(?:gif|jpe?g|png)$ no-gzip dont-vary
        SetEnvIfNoCase Request_URI \
            \.(?:exe|t?gz|zip|bz2|sit|rar)$ no-gzip dont-vary
    </Location>
</VirtualHost>

# Additional Configuration for Main VirtualHost
# Add this to your main httpd-vhosts.conf
<VirtualHost *:80>
    ServerName localhost
    Alias "/farmos" "c:/wamp64/www/farmos"
    
    <Directory "c:/wamp64/www/farmos">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
