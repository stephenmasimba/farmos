# Apache Virtual Host Configuration for FarmOS
# Place this in your WAMP Apache httpd-vhosts.conf file

<VirtualHost *:80>
    ServerName farmos.local
    DocumentRoot "c:/wamp64/www/farmos/begin_pyphp/frontend/public"
    
    <Directory "c:/wamp64/www/farmos/begin_pyphp/frontend/public">
        Options +Indexes +Includes +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
    </Directory>
    
    # Proxy API requests to FastAPI backend
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api
    
    # Proxy /docs and /redoc to FastAPI backend
    ProxyPass /docs http://127.0.0.1:8000/docs
    ProxyPassReverse /docs http://127.0.0.1:8000/docs
    ProxyPass /redoc http://127.0.0.1:8000/redoc
    ProxyPassReverse /redoc http://127.0.0.1:8000/redoc
    
    ErrorLog "logs/farmos-error.log"
    CustomLog "logs/farmos-access.log" common
</VirtualHost>

